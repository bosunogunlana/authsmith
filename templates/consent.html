<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authorize Access – Authsmith</title>
    <style>
        body        { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
        h1          { font-size: 1.4rem; margin-bottom: 4px; }
        .subtitle   { color: #6b7280; font-size: 0.9rem; margin-bottom: 32px; }
        .card       { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; }
        .card h2    { font-size: 1rem; margin: 0 0 12px; }
        ul          { margin: 0; padding: 0 0 0 18px; }
        li          { font-size: 0.9rem; color: #374151; margin-bottom: 6px; }
        .actions    { display: flex; gap: 12px; }
        .btn-allow  { flex: 1; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        .btn-deny   { flex: 1; padding: 10px; background: white; color: #374151; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        .client-type { font-size: 0.8rem; color: #6b7280; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>{{.ClientName}} is requesting access</h1>
    <p class="subtitle">Sign in as {{.UserEmail}} · <a href="/logout">Not you?</a></p>

    <div class="card">
        <h2>This app is requesting permission to:</h2>
        <ul>
            {{range .Scopes}}
            <li>{{.}}</li>
            {{end}}
        </ul>
    </div>

    <form method="POST" action="/oauth/consent">
        <input type="hidden" name="response_type" value="{{.ResponseType}}">
        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
        <input type="hidden" name="scope" value="{{.Scope}}">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
        <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">

        <div class="actions">
            <button type="submit" name="decision" value="allow" class="btn-allow">Allow</button>
            <button type="submit" name="decision" value="deny" class="btn-deny">Deny</button>
        </div>
    </form>
</body>
</html>
