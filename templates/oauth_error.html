<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authorization Error – Authsmith</title>
    <style>
        body  { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
        h1    { font-size: 1.4rem; margin-bottom: 8px; color: #dc2626; }
        p     { color: #374151; font-size: 0.95rem; line-height: 1.6; }
        code  { background: #f3f4f6; padding: 2px 6px; border-radius: 3px; font-size: 0.85rem; }
        a     { color: #2563eb; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Authorization Error</h1>
    <p>{{.Message}}</p>

    {{if .ErrorCode}}
    <p>Error code: <code>{{.ErrorCode}}</code></p>
    {{end}}

    <p><a href="/">Return home</a></p>
</body>
</html>
