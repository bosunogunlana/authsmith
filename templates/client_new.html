<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Client – Authsmith</title>
    <style>
        body    { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
        h1      { font-size: 1.4rem; margin-bottom: 24px; }
        label   { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 8px; margin-bottom: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .hint   { font-size: 0.8rem; color: #6b7280; margin-bottom: 16px; }
        .radio-group { display: flex; gap: 24px; margin-bottom: 4px; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; }
        button  { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px; }
        .error  { color: #dc2626; margin-bottom: 16px; font-size: 0.9rem; }
        a       { color: #2563eb; font-size: 0.9rem; }
        .back   { display: block; margin-bottom: 24px; }
    </style>
</head>
<body>
    <a href="/developer/clients" class="back">← Back to clients</a>
    <h1>Register OAuth Client</h1>

    {{range .Errors}}
        <p class="error">{{.}}</p>
    {{end}}

    <form method="POST" action="/developer/clients">
        <label for="name">App name</label>
        <input type="text" id="name" name="name" placeholder="My Application" required>
        <p class="hint">Shown to users on the consent screen.</p>

        <label>Client type</label>
        <div class="radio-group">
            <label><input type="radio" name="client_type" value="confidential" checked> Confidential</label>
            <label><input type="radio" name="client_type" value="public"> Public</label>
        </div>
        <p class="hint">Confidential: backend server app. Public: SPA, mobile, or CLI.</p>

        <label for="redirect_uris">Redirect URI</label>
        <input type="text" id="redirect_uris" name="redirect_uris" placeholder="https://yourapp.com/callback" required>
        <p class="hint">Must match exactly during authorization requests.</p>

        <label for="allowed_scopes">Allowed scopes</label>
        <input type="text" id="allowed_scopes" name="allowed_scopes" placeholder="profile:read email" required>
        <p class="hint">Space-separated list of scopes this client may request.</p>

        <button type="submit">Register client</button>
    </form>
</body>
</html>
