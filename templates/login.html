<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Authsmith</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 16px; }
        h1   { font-size: 1.4rem; margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
        input { width: 100%; padding: 8px; margin-bottom: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #dc2626; margin-bottom: 16px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Sign in to Authsmith</h1>

    {{if .Error}}
    <p class="error">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Sign in</button>
    </form>
</body>
</html>
